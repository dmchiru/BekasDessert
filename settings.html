<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bekas Desserts | Configuración</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --chocolate:#5A2D1F;
      --caramel:#D9A066;
      --cream:#F3ECE7;
      --mocha:#8B5A3C;
      --white:#fffdfb;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      scroll-behavior:smooth;
    }

    body{
      font-family:'Poppins',sans-serif;
      background:var(--cream);
      color:var(--chocolate);
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    .container{
      width:min(1200px,92%);
      margin:auto;
    }

    header{
      position:sticky;
      top:0;
      z-index:50;
      background:rgba(243,236,231,.9);
      backdrop-filter:blur(14px);
      border-bottom:1px solid rgba(90,45,31,.08);
    }

    .navbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:18px 0;
    }

    .logo-box{
      width:220px;
      height:80px;
      display:flex;
      align-items:center;
    }

    .logo-img{
      max-width:100%;
      max-height:70px;
      object-fit:contain;
    }

    .nav-links{
      display:flex;
      gap:28px;
      align-items:center;
      flex-wrap:wrap;
    }

    .nav-links a:hover{
      color:var(--caramel);
    }

    .nav-btn{
      padding:14px 24px;
      border-radius:999px;
      background:linear-gradient(135deg,var(--chocolate),var(--mocha));
      color:white;
      font-weight:600;
    }

    .hero{
      text-align:center;
      padding:80px 0 40px;
    }

    .eyebrow{
      text-transform:uppercase;
      letter-spacing:2px;
      color:var(--caramel);
      font-size:.8rem;
      font-weight:600;
      margin-bottom:14px;
    }

    h1{
      font-family:'Cormorant Garamond',serif;
      font-size:4rem;
      margin-bottom:16px;
    }

    .hero p{
      max-width:720px;
      margin:auto;
      line-height:1.8;
      color:var(--mocha);
    }

    .settings-card{
      max-width:700px;
      margin:30px auto 80px;
      background:rgba(255,253,251,.95);
      border-radius:30px;
      padding:40px;
      box-shadow:0 18px 40px rgba(90,45,31,.08);
      border:1px solid rgba(90,45,31,.08);
    }

    .settings-card h2{
      font-family:'Cormorant Garamond',serif;
      font-size:2.5rem;
      margin-bottom:20px;
    }

    .form-group{
      margin-bottom:20px;
    }

    label{
      display:block;
      margin-bottom:8px;
      font-weight:500;
    }

    input{
      width:100%;
      padding:15px;
      border-radius:16px;
      border:1px solid rgba(90,45,31,.12);
      font-family:'Poppins',sans-serif;
      font-size:1rem;
      background:white;
    }

    .btn{
      display:inline-block;
      padding:14px 24px;
      border-radius:999px;
      background:linear-gradient(135deg,var(--chocolate),var(--mocha));
      color:white;
      font-weight:600;
      border:none;
      cursor:pointer;
      margin-top:10px;
    }

    .btn-secondary{
      background:rgba(243,236,231,.9);
      color:var(--chocolate);
      margin-left:12px;
    }

    footer{
      background:var(--chocolate);
      color:var(--cream);
      text-align:center;
      padding:40px 0 20px;
      margin-top:40px;
    }

    @media(max-width:900px){
      h1{
        font-size:2.8rem;
      }

      .settings-card{
        padding:28px;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="container navbar">
    <div class="logo-box">
      <img src="images/Logo name.png" alt="Bekas Desserts" class="logo-img">
    </div>

    <nav class="nav-links">
      <a href="index.html">Inicio</a>
      <a href="about.html">Nosotros</a>
      <a href="gallery.html">Galería</a>
      <a href="faq.html">FAQ</a>
      <a href="contact.html">Contacto</a>
      <a href="payment.html" class="nav-btn">Ver Orden</a>
    </nav>
  </div>
</header>

<section class="hero">
  <div class="container">
    <div class="eyebrow">Configuración</div>
    <h1>Administra tu cuenta</h1>
    <p>
      Actualiza tu información personal, datos de contacto y preferencias para tus pedidos.
    </p>
  </div>
</section>

<section class="settings-card">
  <h2>Información personal</h2>

  <div class="form-group">
    <label>Nombre</label>
    <input type="text" value="Beka">
  </div>

  <div class="form-group">
    <label>Correo electrónico</label>
    <input type="email" value="beka@email.com">
  </div>

  <div class="form-group">
    <label>Teléfono</label>
    <input type="text" value="+1 (812) 589-5476">
  </div>

  <div class="form-group">
    <label>Dirección de entrega</label>
    <input type="text" placeholder="Tu dirección">
  </div>

  <div class="form-group">
    <label>Nueva contraseña</label>
    <input type="password" placeholder="••••••••">
  </div>

  <button class="btn">Guardar cambios</button>
  <button class="btn btn-secondary">Cancelar</button>
</section>

<footer>
  © 2026 Bekas Desserts. Todos los derechos reservados.
</footer>

</body>
</html>
