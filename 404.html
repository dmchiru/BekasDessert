<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bekas Desserts | Página no encontrada</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

   <link rel="icon" type="image/png" href="images/Logo Bekas.png"> 
  
  <style>
    :root{
      --chocolate:#5A2D1F;
      --caramel:#D9A066;
      --cream:#F3ECE7;
      --mocha:#8B5A3C;
      --white:#fffdfb;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins',sans-serif;
      background:var(--cream);
      color:var(--chocolate);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:30px;
      overflow:hidden;
      position:relative;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    .bg-circle{
      position:absolute;
      border-radius:50%;
      opacity:.18;
      z-index:0;
      animation:float 8s ease-in-out infinite;
    }

    .circle-1{
      width:180px;
      height:180px;
      background:var(--caramel);
      top:60px;
      left:60px;
    }

    .circle-2{
      width:220px;
      height:220px;
      background:var(--mocha);
      bottom:80px;
      right:60px;
      animation-delay:2s;
    }

    @keyframes float{
      0%,100%{transform:translateY(0);}
      50%{transform:translateY(-20px);}
    }

    .error-card{
      position:relative;
      z-index:2;
      width:min(700px,100%);
      background:rgba(255,253,251,.95);
      border-radius:32px;
      padding:60px 40px;
      box-shadow:0 20px 45px rgba(90,45,31,.08);
      border:1px solid rgba(90,45,31,.08);
    }

    .error-code{
      font-family:'Cormorant Garamond',serif;
      font-size:8rem;
      line-height:1;
      margin-bottom:16px;
    }

    h1{
      font-family:'Cormorant Garamond',serif;
      font-size:3rem;
      margin-bottom:18px;
    }

    p{
      color:var(--mocha);
      line-height:1.8;
      max-width:560px;
      margin:auto;
      margin-bottom:28px;
    }

    .btn{
      display:inline-block;
      padding:15px 26px;
      border-radius:999px;
      background:linear-gradient(135deg,var(--chocolate),var(--mocha));
      color:white;
      font-weight:600;
      transition:.25s ease;
    }

    .btn:hover{
      transform:translateY(-3px);
    }

    @media(max-width:700px){
      .error-code{
        font-size:5.5rem;
      }

      h1{
        font-size:2.2rem;
      }
    }
  </style>
</head>
<body>

  <div class="bg-circle circle-1"></div>
  <div class="bg-circle circle-2"></div>

  <div class="error-card">
    <div class="error-code">404</div>

    <h1>Página no encontrada</h1>

    <p>
      Lo sentimos, la página que intentas visitar no existe o fue movida.
      Regresa al inicio para continuar explorando nuestros pasteles y pedidos personalizados.
    </p>

    <a href="index.html" class="btn">Volver al inicio</a>
  </div>

</body>
</html>
