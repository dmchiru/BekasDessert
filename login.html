<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bekas Desserts | Login</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --chocolate:#5A2D1F;
      --caramel:#D9A066;
      --cream:#F3ECE7;
      --mocha:#8B5A3C;
      --white:#fffdfb;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      scroll-behavior:smooth;
    }

    body{
      font-family:'Poppins',sans-serif;
      background:var(--cream);
      color:var(--chocolate);
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    .container{
      width:min(1200px,92%);
      margin:auto;
    }

    header{
      position:sticky;
      top:0;
      z-index:50;
      background:rgba(243,236,231,.9);
      backdrop-filter:blur(14px);
      border-bottom:1px solid rgba(90,45,31,.08);
    }

    .navbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:18px 0;
    }

    .logo-box{
      width:220px;
      height:80px;
      display:flex;
      align-items:center;
    }

    .logo-img{
      max-width:100%;
      max-height:70px;
      object-fit:contain;
    }

    .nav-links{
      display:flex;
      gap:28px;
      align-items:center;
      flex-wrap:wrap;
    }

    .nav-links a:hover{
      color:var(--caramel);
    }

    .nav-btn{
      padding:14px 24px;
      border-radius:999px;
      background:linear-gradient(135deg,var(--chocolate),var(--mocha));
      color:white;
      font-weight:600;
    }

    .login-wrapper{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:70px 0;
    }

    .login-card{
      width:min(520px,100%);
      background:rgba(255,253,251,.95);
      border-radius:30px;
      padding:40px;
      box-shadow:0 18px 40px rgba(90,45,31,.08);
      border:1px solid rgba(90,45,31,.08);
    }

    .eyebrow{
      text-transform:uppercase;
      letter-spacing:2px;
      color:var(--caramel);
      font-size:.8rem;
      font-weight:600;
      margin-bottom:14px;
      text-align:center;
    }

    h1{
      font-family:'Cormorant Garamond',serif;
      font-size:3.5rem;
      text-align:center;
      margin-bottom:18px;
    }

    .subtitle{
      text-align:center;
      color:var(--mocha);
      line-height:1.8;
      margin-bottom:28px;
    }

    .form-group{
      margin-bottom:18px;
    }

    label{
      display:block;
      margin-bottom:8px;
      font-weight:500;
    }

    input{
      width:100%;
      padding:15px;
      border-radius:16px;
      border:1px solid rgba(90,45,31,.12);
      font-family:'Poppins',sans-serif;
      font-size:1rem;
      background:white;
    }

    .btn{
      width:100%;
      padding:15px;
      border:none;
      border-radius:999px;
      background:linear-gradient(135deg,var(--chocolate),var(--mocha));
      color:white;
      font-weight:600;
      font-size:1rem;
      cursor:pointer;
      margin-top:10px;
    }

    .extra-links{
      margin-top:22px;
      text-align:center;
      display:grid;
      gap:10px;
    }

    .extra-links a{
      color:var(--mocha);
      font-size:.95rem;
    }

    .extra-links a:hover{
      color:var(--caramel);
    }

    footer{
      background:var(--chocolate);
      color:var(--cream);
      text-align:center;
      padding:30px 0 15px;
    }

    @media(max-width:700px){
      h1{
        font-size:2.6rem;
      }

      .nav-links{
        gap:16px;
        font-size:.9rem;
      }
    }
  </style>
</head>
<body>

<header>
    <div class="container navbar">
      <div class="logo-box">
        <img src="images/Logo name.png" alt="Bekas Desserts Logo" class="logo-img">
      </div>

      <nav class="nav-links">
  <a href="index.html">Inicio</a>
  <a href="about.html">Nosotros</a>
  <a href="index.html#catalogo">Pasteles</a>
  <a href="gallery.html">Galería</a>
  <a href="faq.html">FAQ</a>
  <a href="contact.html">Contacto</a>
  <a href="login.html">Login</a>
  <a href="payment.html" class="nav-btn">Ver Orden</a>
</nav>
    </div>
  </header>

<section class="login-wrapper">
  <div class="login-card">

    <div class="eyebrow">Mi cuenta</div>
    <h1>Iniciar sesión</h1>

    <p class="subtitle">
      Accede a tu cuenta para revisar tus pedidos, repetir órdenes anteriores
      y gestionar tus detalles personalizados.
    </p>

    <div class="form-group">
      <label>Correo electrónico</label>
      <input type="email" placeholder="tuemail@ejemplo.com">
    </div>

    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" placeholder="••••••••">
    </div>

    <button class="btn">Entrar</button>

    <div class="extra-links">
      <a href="signup.html">Crear cuenta</a>
      <a href="contact.html">¿Olvidaste tu contraseña?</a>
    </div>

  </div>
</section>

<footer>
  © 2026 Bekas Desserts. Todos los derechos reservados.
</footer>

</body>
</html>
